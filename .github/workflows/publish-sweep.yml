name: Sweep + publish missing packages

# Walks every `packages/*/hatchfile`, computes the publish tag
# `publish/<pkg-dir>@<version>` for each, and asks the hatch-bot
# Edge Function to create any tag that doesn't already exist.
# The pushed tags fire the existing `publish-pkg.yml` (pure-Wren)
# and `publish-plugin.yml` (plugin-backed) workflows — those
# already gate on `[plugin_source]` so each tag fans out to
# exactly one of them.
#
# Why a separate sweep workflow:
#
#   * Bumping a `version =` line in any hatchfile and merging is
#     the only ceremony for a release. No `git tag` dance, no
#     remembering which packages need re-cutting after a
#     dependency churn.
#   * Idempotent: if every tag already exists, the run is a no-op.
#   * Safe to schedule daily — same logic as a manual run.
#
# # Why hatch-bot owns the tag push (vs. doing it from CI)
#
# Pushing a tag with the workflow's own `GITHUB_TOKEN` does *not*
# trigger downstream workflows (GitHub guards against infinite
# loops). Tag pushes from a GitHub App's installation token *do*
# trigger them. The org has fine-grained PATs disabled, so we
# don't have a clean PAT path.
#
# `hatch-bot/tag` (Supabase Edge Function) holds the App
# credentials, mints a per-call installation token, and creates
# `refs/tags/<tag>` via the GitHub API. CI just POSTs the tag
# name + commit sha and presents `HATCH_BOT_SECRET` as a bearer.
# Same secret model the publish path already uses — no new
# vault entries.
#
# Required Edge Function env (set on the Supabase function, not
# in CI):
#
#   HATCH_GH_APP_ID          — numeric App ID
#   HATCH_GH_APP_PRIVATE_KEY — full PEM (PKCS#1 or PKCS#8 OK)
#
# (owner/repo default to `wrenlift/hatch` inside the function;
# bodies can override if it ever serves another project.)
#
# Required GitHub Actions config (already present for the
# publish path):
#
#   vars.HATCH_BOT_URL       — e.g. `https://<proj>.supabase.co/functions/v1/hatch-bot`
#   secrets.HATCH_BOT_SECRET — bearer

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List missing tags but don't push them"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    # Daily at 06:00 UTC. Picks up version bumps that landed
    # between manual sweeps; cheap when nothing is missing.
    - cron: "0 6 * * *"
  push:
    branches: [main]
    paths:
      - "packages/*/hatchfile"

permissions:
  # Read-only — the actual tag creation goes through hatch-bot,
  # not through the runner's git credentials.
  contents: read

concurrency:
  # Two sweeps racing each other could double-POST the same tag.
  # The hatch-bot endpoint treats a 422 (ref exists) as success,
  # so this is just paranoia, but it also keeps logs clean.
  group: publish-sweep
  cancel-in-progress: true

jobs:
  sweep:
    name: Sweep packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need every existing tag in `refs/tags/publish/*` so the
          # tag-existence check is accurate. `0` fetches the full
          # history; cheap on this repo's size.
          fetch-depth: 0

      - name: Discover missing publish tags
        id: discover
        shell: bash
        run: |
          set -eu
          missing=()
          skipped=()
          while IFS= read -r hf; do
            pkg_dir=$(basename "$(dirname "$hf")")
            version=$(awk -F'"' '/^version *=/ {print $2; exit}' "$hf")
            if [ -z "$version" ]; then
              echo "::warning file=$hf::no version field, skipping $pkg_dir"
              continue
            fi
            tag="publish/${pkg_dir}@${version}"
            # `git rev-parse --verify` is the cheap local check;
            # we already ran `fetch-depth: 0` so every tag is
            # present. Quiet (`-q`) so unknown refs don't pollute
            # the log.
            if git rev-parse -q --verify "refs/tags/${tag}" > /dev/null 2>&1; then
              skipped+=("$tag")
            else
              missing+=("$tag")
            fi
          done < <(find packages -mindepth 2 -maxdepth 2 -name hatchfile | sort)

          echo "::group::skipped (tag already exists)"
          for t in "${skipped[@]}"; do echo "$t"; done
          echo "::endgroup::"

          echo "::group::missing (will be tagged)"
          for t in "${missing[@]}"; do echo "$t"; done
          echo "::endgroup::"

          # Emit as a multiline output so the next step can iterate.
          {
            echo "tags<<EOF"
            for t in "${missing[@]}"; do echo "$t"; done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "count=${#missing[@]}" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "### Sweep result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Missing tags: **${{ steps.discover.outputs.count }}**" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.discover.outputs.count }}" != "0" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "${{ steps.discover.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Check hatch-bot config
        if: steps.discover.outputs.count != '0' && inputs.dry_run != 'true'
        env:
          BOT_URL:    ${{ vars.HATCH_BOT_URL }}
          BOT_SECRET: ${{ secrets.HATCH_BOT_SECRET }}
        shell: bash
        run: |
          if [ -z "$BOT_URL" ] || [ -z "$BOT_SECRET" ]; then
            echo "::error::HATCH_BOT_URL var / HATCH_BOT_SECRET secret unset; can't reach hatch-bot."
            exit 1
          fi

      - name: Create missing tags via hatch-bot
        if: steps.discover.outputs.count != '0' && inputs.dry_run != 'true'
        env:
          BOT_URL:    ${{ vars.HATCH_BOT_URL }}
          BOT_SECRET: ${{ secrets.HATCH_BOT_SECRET }}
        shell: bash
        run: |
          set -eu
          # Sweep tags from the commit that triggered this run
          # (or main's tip for schedule / dispatch). The pushed
          # tag points at this sha, so downstream workflows see
          # the same code the sweep saw.
          sha="${GITHUB_SHA}"
          fail=0
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            # `--fail-with-body` so non-2xx responses still print
            # the body before curl exits non-zero — without it
            # the error path is just "exit 22" with no detail.
            payload=$(printf '{"tag":"%s","sha":"%s"}' "$tag" "$sha")
            if ! resp=$(curl -sS --fail-with-body \
                -X POST "${BOT_URL}/tag" \
                -H "Authorization: Bearer ${BOT_SECRET}" \
                -H "Content-Type: application/json" \
                -d "$payload"); then
              echo "::error::tagging $tag failed: $resp"
              fail=1
              continue
            fi
            echo "::notice::tagged $tag — $resp"
          done <<< "${{ steps.discover.outputs.tags }}"
          # Exit non-zero if ANY tag failed, so the run is marked
          # red and a maintainer notices. Successful tags already
          # got their downstream workflow runs queued.
          exit $fail
