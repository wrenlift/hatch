name: Sweep + publish missing packages

# Walks every `packages/*/hatchfile`, computes the publish tag
# `publish/<pkg-dir>@<version>` for each, and pushes any tag that
# doesn't already exist. The pushed tags fire the existing
# `publish-pkg.yml` (pure-Wren) and `publish-plugin.yml`
# (plugin-backed) workflows — those already gate on
# `[plugin_source]` so each tag fans out to exactly one of them.
#
# Why a separate sweep workflow:
#
#   * Bumping a `version =` line in any hatchfile and merging is
#     the only ceremony for a release. No `git tag` dance, no
#     remembering which packages need re-cutting after a
#     dependency churn.
#   * Idempotent: if every tag already exists, the run is a no-op.
#   * Safe to schedule daily — same logic as a manual run.
#
# # GitHub App auth (why, not PAT)
#
# Pushing a tag with the default `${{ secrets.GITHUB_TOKEN }}` does
# *not* trigger downstream workflows (GitHub guards against
# infinite loops). For the sweep to actually fire `publish-pkg.yml`
# / `publish-plugin.yml`, we push with a token minted from a
# GitHub App installation. App-minted tokens *do* trigger
# downstream workflows.
#
# We use a GitHub App rather than a PAT because:
#
#   * Org repos block fine-grained PATs by default; classic PATs
#     have repo-wide scope and bind to a user identity that has
#     to stick around forever.
#   * App tokens are short-lived (1 h), scoped to just the perms
#     the app declares, and don't disappear when a maintainer
#     rotates accounts.
#
# Setup once per org:
#
#   1. Create a GitHub App in the org with permissions
#      `Contents: Read and write` and `Metadata: Read`.
#   2. Install it on this repo only.
#   3. Generate a private key, store it as `SWEEP_APP_PRIVATE_KEY`
#      secret (entire PEM, including header/footer).
#   4. Store the App's numeric ID as `SWEEP_APP_ID` secret.
#
# The `Check app credentials` step below fails fast with an
# actionable message if either secret is missing.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List missing tags but don't push them"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    # Daily at 06:00 UTC. Picks up version bumps that landed
    # between manual sweeps; cheap when nothing is missing.
    - cron: "0 6 * * *"
  push:
    branches: [main]
    paths:
      - "packages/*/hatchfile"

permissions:
  # `contents: read` is enough to *read* the hatchfiles + the tag
  # list. The actual `git push` of new tags uses the App-minted
  # token, not GITHUB_TOKEN, so we don't need write here.
  contents: read

concurrency:
  # Two sweeps racing each other could double-push the same tag.
  # Serialise; cancel any in-flight sweep when a new push lands
  # (newer hatchfile state always supersedes the older sweep).
  group: publish-sweep
  cancel-in-progress: true

jobs:
  sweep:
    name: Sweep packages
    runs-on: ubuntu-latest
    steps:
      - name: Check app credentials
        if: inputs.dry_run != 'true'
        env:
          APP_ID:  ${{ secrets.SWEEP_APP_ID }}
          APP_KEY: ${{ secrets.SWEEP_APP_PRIVATE_KEY }}
        shell: bash
        run: |
          if [ -z "$APP_ID" ] || [ -z "$APP_KEY" ]; then
            echo "::error::SWEEP_APP_ID / SWEEP_APP_PRIVATE_KEY secrets are unset; can't mint a token to push release tags."
            echo "::error::Create a GitHub App with 'Contents: Read and write', install it on this repo, and store the App ID + private key as those secrets."
            exit 1
          fi

      - name: Mint installation token
        id: app-token
        if: inputs.dry_run != 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id:      ${{ secrets.SWEEP_APP_ID }}
          private-key: ${{ secrets.SWEEP_APP_PRIVATE_KEY }}
          # Repos this token is scoped to. Single-repo install,
          # but stating it explicitly keeps the token's blast
          # radius minimal even if the App later gets installed
          # elsewhere.
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@v4
        with:
          # Need every existing tag in `refs/tags/publish/*` so the
          # tag-existence check is accurate. `0` fetches the full
          # history; cheap on this repo's size.
          fetch-depth: 0
          # Use the app-minted token for checkout — that plants the
          # `http.https://github.com/.extraheader` config with the
          # App's identity, so the downstream `git push` inherits
          # it. Without this, push goes out as `github-actions[bot]`
          # (extraheader outranks remote-URL credentials).
          # Falls back to `github.token` for dry-run paths where
          # the previous step was skipped.
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Discover missing publish tags
        id: discover
        shell: bash
        run: |
          set -eu
          missing=()
          skipped=()
          while IFS= read -r hf; do
            pkg_dir=$(basename "$(dirname "$hf")")
            version=$(awk -F'"' '/^version *=/ {print $2; exit}' "$hf")
            if [ -z "$version" ]; then
              echo "::warning file=$hf::no version field, skipping $pkg_dir"
              continue
            fi
            tag="publish/${pkg_dir}@${version}"
            # `git rev-parse --verify` is the cheap local check;
            # we already ran `fetch-depth: 0` so every tag is
            # present. Quiet (`-q`) so unknown refs don't pollute
            # the log.
            if git rev-parse -q --verify "refs/tags/${tag}" > /dev/null 2>&1; then
              skipped+=("$tag")
            else
              missing+=("$tag")
            fi
          done < <(find packages -mindepth 2 -maxdepth 2 -name hatchfile | sort)

          echo "::group::skipped (tag already exists)"
          for t in "${skipped[@]}"; do echo "$t"; done
          echo "::endgroup::"

          echo "::group::missing (will be tagged)"
          for t in "${missing[@]}"; do echo "$t"; done
          echo "::endgroup::"

          # Emit as a multiline output so the next step can iterate.
          {
            echo "tags<<EOF"
            for t in "${missing[@]}"; do echo "$t"; done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "count=${#missing[@]}" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "### Sweep result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Missing tags: **${{ steps.discover.outputs.count }}**" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.discover.outputs.count }}" != "0" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "${{ steps.discover.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Push missing tags
        if: steps.discover.outputs.count != '0' && inputs.dry_run != 'true'
        shell: bash
        run: |
          set -eu
          # Identify commits as the App's bot user. The numeric
          # `app-slug[bot]` prefix avoids GitHub's "unverified"
          # warning since the email matches the bot identity
          # GitHub minted the token for.
          git config user.name  "hatch-sweep[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          # No `git remote set-url` here — checkout above already
          # configured `http.https://github.com/.extraheader` with
          # the App-minted token, and that's what `git push` uses.
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            # Annotated tag — `softprops/action-gh-release` reads
            # the tag message, and `git for-each-ref` shows it in
            # tag listings. Cheap, more useful than a lightweight
            # tag.
            git tag -a "$tag" -m "$tag"
            # Push one at a time so a failure on tag N doesn't
            # leave tags 1..N-1 unpushed (atomic per-tag).
            git push origin "$tag"
            echo "::notice::pushed $tag"
          done <<< "${{ steps.discover.outputs.tags }}"
