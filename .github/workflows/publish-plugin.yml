name: Publish plugin-backed package

# Builds any hatch package that declares a `[plugin_source]` in
# its hatchfile. The workflow is generic — every concrete detail
# (upstream repo, pinned rev, crate name) is read from the
# hatchfile itself so adding a new plugin-backed package is
# strictly a data change:
#
#   [plugin_source]
#   repo  = "https://github.com/wrenlift/WrenLift.git"
#   rev   = "cbf2e1c..."
#   crate = "wlift_foo"          # cargo package name in `repo`
#
# The artifact basename also comes from the crate name
# (`libwlift_foo.dylib` / `libwlift_foo.so` / `wlift_foo.dll`).
# No per-package YAML edits required.
#
# Trigger: manual (workflow_dispatch) with a `package` input, or
# a tag matching `publish/<package>@<version>`.

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package directory under `packages/` (e.g. `hatch-sqlite`)"
        required: true
        type: string
  push:
    tags:
      - 'publish/*@*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------
  # Resolve: parse the target hatchfile once and surface all the
  # per-package knobs every downstream job needs.
  # ---------------------------------------------------------------
  resolve:
    name: Resolve target
    runs-on: ubuntu-latest
    outputs:
      package:    ${{ steps.out.outputs.package }}
      version:    ${{ steps.out.outputs.version }}
      repo:       ${{ steps.out.outputs.repo }}
      rev:        ${{ steps.out.outputs.rev }}
      crate:      ${{ steps.out.outputs.crate }}
      web_crate:  ${{ steps.out.outputs.web_crate }}
      has_plugin: ${{ steps.out.outputs.has_plugin }}
    steps:
      - uses: actions/checkout@v4

      - name: Read hatchfile
        id: out
        shell: bash
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pkg_dir="${{ inputs.package }}"
          else
            # `publish/<pkg>@<ver>` — strip prefix, split on '@'.
            tag="${{ github.ref_name }}"
            rest="${tag#publish/}"
            pkg_dir="${rest%@*}"
          fi
          hatchfile="packages/${pkg_dir}/hatchfile"
          if [ ! -f "$hatchfile" ]; then
            echo "::error::no hatchfile at $hatchfile" && exit 1
          fi

          version=$(awk -F'"' '/^version *=/ {print $2; exit}' "$hatchfile")
          if [ "${{ github.event_name }}" = "push" ]; then
            version="${tag##*@}"
          fi

          # `publish-pkg.yml` shares the same `publish/*@*` tag
          # trigger so dual-firing is the norm. If this hatchfile
          # has no `[plugin_source]`, the package is pure-Wren —
          # `publish-pkg.yml` handles it; we exit clean (no
          # error) so the run shows up as a no-op rather than a
          # failure on every pure-Wren publish.
          if ! grep -q '^\[plugin_source\]' "$hatchfile"; then
            echo "::notice::$pkg_dir has no [plugin_source] — handled by publish-pkg.yml"
            echo "has_plugin=false" >> "$GITHUB_OUTPUT"
            echo "package=$pkg_dir" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_plugin=true" >> "$GITHUB_OUTPUT"

          repo=$(awk -F'"'      '/^repo *=/      {print $2; exit}' "$hatchfile")
          rev=$( awk -F'"'      '/^rev *=/       {print $2; exit}' "$hatchfile")
          crate=$(awk -F'"'     '/^crate *=/     {print $2; exit}' "$hatchfile")
          # Optional: a wasm-only companion crate (`<crate>_web`
          # by convention) that produces the `.wasm` cdylib used
          # when the bundle runs in a browser. Hatchfiles that
          # don't ship a web target leave this unset; the
          # `build-web` job is then skipped.
          web_crate=$(awk -F'"' '/^web_crate *=/ {print $2; exit}' "$hatchfile")

          if [ -z "$repo" ] || [ -z "$rev" ] || [ -z "$crate" ]; then
            echo "::error::hatchfile $hatchfile missing [plugin_source] repo / rev / crate" && exit 1
          fi

          echo "package=$pkg_dir"     >> "$GITHUB_OUTPUT"
          echo "version=$version"     >> "$GITHUB_OUTPUT"
          echo "repo=$repo"           >> "$GITHUB_OUTPUT"
          echo "rev=$rev"             >> "$GITHUB_OUTPUT"
          echo "crate=$crate"         >> "$GITHUB_OUTPUT"
          echo "web_crate=$web_crate" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------
  # Build: one matrix entry per target triple. Artifact naming is
  # derived from the crate (libcrate.dylib / libcrate.so / crate.dll)
  # so adding a plugin crate doesn't require editing this file.
  # ---------------------------------------------------------------
  build:
    name: Build ${{ matrix.label }}
    needs: resolve
    if: needs.resolve.outputs.has_plugin == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both darwin targets run on macos-14 (arm64): the
          # Apple toolchain cross-compiles to x86_64 natively, and
          # macos-13 (Intel) runners queue for many minutes on free
          # public capacity. This keeps CI wall-clock predictable.
          - label: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            ext: dylib
            prefix: "lib"
          - label: macos-x86_64
            os: macos-14
            target: x86_64-apple-darwin
            ext: dylib
            prefix: "lib"
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: so
            prefix: "lib"
          - label: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: so
            prefix: "lib"
            use_cross: true
          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: dll
            prefix: ""
    steps:
      - uses: actions/checkout@v4
        with:
          path: hatch

      - name: Check out upstream plugin source
        # Plain git clone so we accept arbitrary URLs
        # (github / gitlab / self-hosted) without a matrix
        # of checkout-action flavors.
        shell: bash
        run: |
          set -eu
          git clone --filter=blob:none \
                    "${{ needs.resolve.outputs.repo }}" source
          git -C source checkout "${{ needs.resolve.outputs.rev }}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            source/target
          key: plugin-${{ needs.resolve.outputs.crate }}-${{ needs.resolve.outputs.rev }}-${{ matrix.target }}

      - name: Build plugin (native)
        if: matrix.use_cross != true
        working-directory: source
        run: cargo build -p ${{ needs.resolve.outputs.crate }} --release --target ${{ matrix.target }}

      - name: Build plugin (cross)
        if: matrix.use_cross == true
        working-directory: source
        run: cross build -p ${{ needs.resolve.outputs.crate }} --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          set -eu
          src="source/target/${{ matrix.target }}/release/${{ matrix.prefix }}${{ needs.resolve.outputs.crate }}.${{ matrix.ext }}"
          if [ ! -f "$src" ]; then
            echo "::error::expected $src not produced" && exit 1
          fi
          mkdir -p dist
          cp "$src" "dist/"
          ls -la dist/

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: dist/
          if-no-files-found: error

  # ---------------------------------------------------------------
  # Build (web): same shape as `build`, but for the wasm-only
  # companion crate. Skipped when the hatchfile doesn't declare
  # `web_crate` under `[plugin_source]` — most plugins ship
  # native-only.
  # ---------------------------------------------------------------
  build-web:
    name: Build wasm32 (${{ needs.resolve.outputs.web_crate }})
    needs: resolve
    if: needs.resolve.outputs.has_plugin == 'true' && needs.resolve.outputs.web_crate != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: hatch

      - name: Check out upstream plugin source
        shell: bash
        run: |
          set -eu
          git clone --filter=blob:none \
                    "${{ needs.resolve.outputs.repo }}" source
          git -C source checkout "${{ needs.resolve.outputs.rev }}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            source/target
          key: plugin-${{ needs.resolve.outputs.web_crate }}-${{ needs.resolve.outputs.rev }}-wasm32

      - name: Build web plugin
        working-directory: source
        run: cargo build -p ${{ needs.resolve.outputs.web_crate }} --release --target wasm32-unknown-unknown

      - name: Stage artifact
        shell: bash
        run: |
          set -eu
          # wasm cdylib output has no `lib` prefix.
          src="source/target/wasm32-unknown-unknown/release/${{ needs.resolve.outputs.web_crate }}.wasm"
          if [ ! -f "$src" ]; then
            echo "::error::expected $src not produced" && exit 1
          fi
          mkdir -p dist
          cp "$src" "dist/"
          ls -la dist/

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm32
          path: dist/
          if-no-files-found: error

  # ---------------------------------------------------------------
  # Publish: drop the per-platform dylibs into the package's libs/
  # dir, run hatch publish, and (on tag push) archive them as a
  # versioned release so historical publishes stay auditable.
  # ---------------------------------------------------------------
  publish:
    name: Bundle + publish
    needs: [resolve, build, build-web]
    # `build-web` is skipped for native-only plugins; that's
    # fine, we just need it to either succeed or be skipped.
    # `always()` lets the publish job run despite a skip.
    if: |
      always()
      && needs.resolve.outputs.has_plugin == 'true'
      && needs.build.result == 'success'
      && (needs.build-web.result == 'success' || needs.build-web.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download every matrix artifact
        uses: actions/download-artifact@v4
        with:
          path: dylibs
          pattern: "*"

      - name: Stage dylibs into the package's libs/<os-arch>/ dirs
        shell: bash
        run: |
          set -eu
          pkg="${{ needs.resolve.outputs.package }}"
          dest="packages/${pkg}/libs"
          mkdir -p "$dest"
          # Each artifact uploaded by the matrix carries the
          # canonical platform-named filename (libwlift_foo.dylib
          # / libwlift_foo.so / wlift_foo.dll). macOS arm64 and
          # macOS x86_64 produce the SAME filename in different
          # dirs, as do Linux x86_64 and Linux arm64 — flat copy
          # would clobber one with the other (the alphabetically-
          # later dir wins). Stage each label into its own
          # `libs/<label>/` so the per-os-arch keys in the
          # hatchfile resolve to distinct paths and
          # `pack_bundled_native_libs` embeds every variant as a
          # separate `<lib>__<label>` section.
          for d in dylibs/*/; do
            label=$(basename "$d")
            mkdir -p "$dest/$label"
            cp "$d"/* "$dest/$label/"
          done
          echo "::group::final libs/ tree"
          find "$dest" -type f
          echo "::endgroup::"

      - name: Install hatch + wlift CLI
        # Pulled from the same upstream revision the plugin was
        # built against — guarantees the CLIs speak the same
        # manifest / bundle formats as the plugin assumes. We
        # need both: `wlift` builds the `.hatch` bundle (with
        # the staged dylibs inside), `hatch publish` registers
        # the catalog row.
        run: |
          cargo install --git "${{ needs.resolve.outputs.repo }}" \
                        --rev  "${{ needs.resolve.outputs.rev }}" \
                        --bins --locked \
                        wren_lift

      - name: Bundle (host-target)
        # Default target — compressed payload. The `libs/` dir
        # we just staged gets pulled into the bundle so `hatch
        # install` lands a single self-contained `.hatch` with
        # every per-platform dylib inside.
        run: |
          set -eu
          pkg="${{ needs.resolve.outputs.package }}"
          ver="${{ needs.resolve.outputs.version }}"
          mkdir -p dist
          wlift "packages/${pkg}" --bundle "dist/${pkg}-${ver}.hatch"

      - name: Bundle (wasm32 target)
        # Uncompressed payload, target stamped wasm32-unknown-
        # unknown. Browser playground fetches this variant.
        run: |
          set -eu
          pkg="${{ needs.resolve.outputs.package }}"
          ver="${{ needs.resolve.outputs.version }}"
          wlift "packages/${pkg}" \
            --bundle "dist/${pkg}-${ver}-wasm32.hatch" \
            --bundle-target wasm32-unknown-unknown

      - name: Sanity check bundles
        run: |
          set -eu
          pkg="${{ needs.resolve.outputs.package }}"
          ver="${{ needs.resolve.outputs.version }}"
          echo "::group::host-target inspect"
          wlift "dist/${pkg}-${ver}.hatch" --inspect
          echo "::endgroup::"
          echo "::group::wasm32-target inspect"
          wlift "dist/${pkg}-${ver}-wasm32.hatch" --inspect
          echo "::endgroup::"

      - name: Hatch publish
        env:
          # hatch-bot is a Supabase Edge Function (see
          # `supabase/functions/hatch-bot/`) that owns the write
          # path against the `packages` table. The CLI detects
          # HATCH_BOT_URL and POSTs the PackageRecord there with
          # HATCH_BOT_SECRET as a bearer. Moves us off the
          # deprecated PostgREST + legacy-JWT flow that CI can't
          # authenticate against under Supabase's new key model.
          HATCH_BOT_URL: ${{ vars.HATCH_BOT_URL }}
          HATCH_BOT_SECRET: ${{ secrets.HATCH_BOT_SECRET }}
        run: |
          set -eu
          # `hatch login --token` still stores the bearer in
          # ~/.hatch/credentials; publish reads it back. Value is
          # the shared secret, not a JWT, but the transport is
          # the same.
          hatch login --token "$HATCH_BOT_SECRET"
          hatch publish -C "packages/${{ needs.resolve.outputs.package }}"

      - name: Attach .hatch + dylibs to a versioned release
        # `hatch install` constructs a download URL of shape
        #   <registry>/releases/download/publish/<dir>%40<ver>/<dir>-<ver>.hatch
        # so the `.hatch` files are the load-bearing assets.
        # The standalone dylibs ride along for audit / replay.
        # Runs for both tag pushes (regular release flow) and
        # manual dispatch (re-attach a missing `.hatch` to an
        # existing release without bumping the version).
        uses: softprops/action-gh-release@v2
        with:
          tag_name: publish/${{ needs.resolve.outputs.package }}@${{ needs.resolve.outputs.version }}
          name: ${{ needs.resolve.outputs.package }}@${{ needs.resolve.outputs.version }}
          files: |
            dist/${{ needs.resolve.outputs.package }}-${{ needs.resolve.outputs.version }}.hatch
            dist/${{ needs.resolve.outputs.package }}-${{ needs.resolve.outputs.version }}-wasm32.hatch
            packages/${{ needs.resolve.outputs.package }}/libs/*
          body: |
            Plugin-backed package built from
            `${{ needs.resolve.outputs.repo }}` @ `${{ needs.resolve.outputs.rev }}`
            for `${{ needs.resolve.outputs.package }}@${{ needs.resolve.outputs.version }}`.
            Three asset classes:
              - `${{ needs.resolve.outputs.package }}-${{ needs.resolve.outputs.version }}.hatch` — host-target bundle (zstd-compressed, contains every per-platform dylib)
              - `${{ needs.resolve.outputs.package }}-${{ needs.resolve.outputs.version }}-wasm32.hatch` — wasm-target bundle
              - `lib*.{so,dylib}` / `*.dll` / `*.wasm` — standalone dylibs, archival only (already inside the `.hatch`)
