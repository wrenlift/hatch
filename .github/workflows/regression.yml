name: Regression — all hatch packages

# Runs every `*.spec.wren` in `packages/*/` against a fresh build
# of `wlift` (from upstream main). This is the gate that keeps the
# catalog honest: if a spec we publish no longer passes against
# the latest runtime, the PR turns red.
#
# Two jobs:
#
#   * interpreter  — required to pass. Safety net for the spec
#                    + runtime stdlib surface. 27+ packages, ~700
#                    specs as of 2026-04-23.
#
#   * tiered       — same specs under the tiered JIT. Marked
#                    `continue-on-error`: tiered-mode flakes are a
#                    known class of bugs we're still hunting (see
#                    `memory/project_tiered_flake_root_causes.md`);
#                    the job surfaces drift but doesn't block PRs.
#                    Upgrade to required once tiered hits 100%.
#
# Packages with a `[plugin_source]` section need per-platform
# dylibs bundled via the `publish-plugin.yml` workflow. When no
# dylibs are present in `libs/` those packages are skipped with a
# warning; everything else runs.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Pin the runtime we test against. Bumping this is a deliberate
  # act (new runtime feature landed, we want the catalog to start
  # exercising it). Leave empty to track `main` automatically.
  WLIFT_REV: ""

jobs:
  # ---------------------------------------------------------------
  # Build wlift once, share via cache + artifact for the per-mode
  # test jobs. Saves re-compiling Cranelift on every job.
  # ---------------------------------------------------------------
  build-wlift:
    name: Build wlift
    runs-on: ubuntu-latest
    outputs:
      rev: ${{ steps.clone.outputs.rev }}
    steps:
      - name: Clone wren_lift
        id: clone
        shell: bash
        run: |
          set -eu
          git clone --filter=blob:none \
                    https://github.com/wrenlift/WrenLift.git source
          if [ -n "${WLIFT_REV:-}" ]; then
            git -C source checkout "$WLIFT_REV"
          fi
          rev=$(git -C source rev-parse HEAD)
          echo "rev=$rev" >> "$GITHUB_OUTPUT"
          echo "wlift rev: $rev"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      # System libraries the platform-specific plugins link
      # against on Linux:
      #   * libasound2-dev    → wlift_audio (cpal/alsa-sys)
      #   * libudev-dev       → wlift_window (winit input device
      #                          enumeration)
      #   * libxkbcommon-dev,
      #     libwayland-dev,
      #     libx11-dev,
      #     libxcb1-dev,
      #     libxrandr-dev,
      #     libxinerama-dev,
      #     libxcursor-dev,
      #     libxi-dev         → wlift_window (winit's X11 + wayland
      #                          backends — pulled in even when
      #                          we'd be running headless, because
      #                          winit picks a backend at runtime)
      # macOS / Windows runners have these via Apple/Microsoft
      # SDKs, so the install step is gated to ubuntu.
      - name: Install plugin system deps (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libasound2-dev \
            libudev-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            source/target
          key: wlift-bin-${{ steps.clone.outputs.rev }}
          restore-keys: wlift-bin-

      - name: Build wlift + hatch
        working-directory: source
        run: cargo build --release --bin wlift --bin hatch

      # Each `[plugin_source]` package in this catalog points at one
      # of the cdylib crates under `wren_lift/plugins/`. We build
      # them here against the same wlift rev so plugin-backed specs
      # exercise the matching ABI version. Without this step
      # `libs/` is empty (the `.so` is gitignored) and the regression
      # job either skips the package or hits "library not found".
      - name: Build plugins
        working-directory: source
        run: |
          for crate in wlift_audio wlift_gpu wlift_image wlift_physics wlift_sqlite wlift_window; do
            cargo build --release -p "$crate"
          done

      - name: Stage artifact dir
        run: |
          mkdir -p out/libs
          cp source/target/release/wlift out/wlift
          cp source/target/release/hatch out/hatch
          # On `ubuntu-latest` cdylibs end up named `lib<crate>.so`.
          # Stage them flat — the spec job knows the package → crate
          # mapping from the hatchfile and copies into each package's
          # `libs/` before running.
          cp source/target/release/lib*.so out/libs/

      - name: Upload wlift + plugins
        uses: actions/upload-artifact@v4
        with:
          name: wlift
          path: out
          if-no-files-found: error
          retention-days: 3

  # ---------------------------------------------------------------
  # Run every `*.spec.wren` under the selected execution mode.
  # The per-package loop is in-lined so GitHub's log UI collapses
  # each package cleanly via `::group::`.
  # ---------------------------------------------------------------
  specs:
    name: Specs — ${{ matrix.mode }}
    needs: build-wlift
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.mode == 'tiered' }}
    strategy:
      fail-fast: false
      matrix:
        mode: [interpreter, tiered]
    steps:
      - uses: actions/checkout@v4

      - name: Download wlift + plugins
        uses: actions/download-artifact@v4
        with:
          name: wlift
          path: bin

      - name: Make wlift + hatch executable
        run: chmod +x bin/wlift bin/hatch

      # Stage each plugin-backed package's matching `lib<crate>.so`
      # into its own `libs/<os>-<arch>/` directory. The hatchfile's
      # `[native_libs.<lib>]` table maps the runner's host triple
      # (`linux-x86_64` here) to a path like
      # `libs/linux-x86_64/libwlift_<crate>.so`; staging anywhere
      # else trips the `name_overrides` lookup with "library not
      # found" even though the dylib exists. The bare-OS keys
      # (`linux = libs/lib<crate>.so`) are a local-dev fallback —
      # CI uses the more specific path so regression matches the
      # published package layout.
      - name: Stage plugin dylibs into packages
        shell: bash
        run: |
          set -eu
          python3 <<'PY'
          import os, shutil, sys, tomllib
          for hf in sorted(os.listdir("packages")):
              hf_path = os.path.join("packages", hf, "hatchfile")
              if not os.path.isfile(hf_path):
                  continue
              with open(hf_path, "rb") as f:
                  manifest = tomllib.load(f)
              ps = manifest.get("plugin_source")
              if not ps:
                  continue
              crate = ps.get("crate")
              if not crate:
                  continue
              src = f"bin/libs/lib{crate}.so"
              dst_dir = os.path.join("packages", hf, "libs", "linux-x86_64")
              os.makedirs(dst_dir, exist_ok=True)
              if os.path.isfile(src):
                  shutil.copy(src, os.path.join(dst_dir, f"lib{crate}.so"))
                  print(f"staged {crate} → {dst_dir}")
              else:
                  print(f"::warning::missing plugin {crate} (expected {src})")
          PY

      # Pre-build every package into a workspace-local hatch cache
      # so `*.spec.wren` runs (which set `HATCH_OFFLINE=1`) can
      # resolve runtime `[dependencies]` without hitting the
      # registry. Topo-sort by `[dependencies]` so each package
      # builds against already-cached deps; spec-deps don't enter
      # the build graph (they're for the spec runner only).
      #
      # Each consumer pins a specific version (e.g.
      # `@hatch:fs = "0.1.0"`). The current package source might
      # be at 0.1.1; in this monorepo every package is API-compatible
      # with the versions its siblings pin (those pins drift with
      # publish cadence, not API churn). We build at the current
      # version and *also* mirror the artifact under every version
      # any sibling pins, so the cache filename matches whatever
      # the resolver looks up.
      - name: Pre-build packages into local hatch cache
        shell: bash
        env:
          HATCH_CACHE_DIR: ${{ github.workspace }}/.hatch-cache
        run: |
          set -eu
          mkdir -p "$HATCH_CACHE_DIR"
          python3 <<'PY'
          import os, shutil, subprocess, sys, tomllib

          PACKAGES_DIR = "packages"
          CACHE_DIR = os.environ["HATCH_CACHE_DIR"]
          HATCH_BIN = os.path.abspath("bin/hatch")

          def scoped_to_dir(name):
              return name[1:].replace(":", "-").replace("/", "-") if name.startswith("@") else name.replace(":", "-").replace("/", "-")

          # Load every manifest.
          pkgs = {}
          for d in sorted(os.listdir(PACKAGES_DIR)):
              hf = os.path.join(PACKAGES_DIR, d, "hatchfile")
              if not os.path.isfile(hf):
                  continue
              with open(hf, "rb") as f:
                  m = tomllib.load(f)
              pkgs[m["name"]] = {
                  "dir": os.path.join(PACKAGES_DIR, d),
                  "version": m["version"],
                  "deps": list((m.get("dependencies") or {}).keys()),
                  "manifest": m,
              }

          # Topological sort by [dependencies] (spec-deps are not
          # part of the build graph). Kahn's algorithm; keep it
          # alphabetical inside a level for deterministic logs.
          remaining = dict(pkgs)
          ordered = []
          while remaining:
              ready = sorted(
                  name for name, info in remaining.items()
                  if all(d not in remaining for d in info["deps"])
              )
              if not ready:
                  print(f"::error::dependency cycle among: {sorted(remaining)}")
                  sys.exit(1)
              for name in ready:
                  ordered.append(name)
                  del remaining[name]

          # Track all (name, version) pairs any consumer pins — we'll
          # mirror each package's bytes under those filenames too.
          required_versions = {}  # name -> set[version]
          for info in pkgs.values():
              for dep_name in info["deps"]:
                  dep_decl = (info["manifest"].get("dependencies") or {}).get(dep_name)
                  if isinstance(dep_decl, str):
                      required_versions.setdefault(dep_name, set()).add(dep_decl)

          for name in ordered:
              info = pkgs[name]
              dir_ = info["dir"]
              version = info["version"]
              flat = scoped_to_dir(name)
              out_path = os.path.join(dir_, f"{name}.hatch")  # built-from-source default
              # `hatch build` writes `<name>.hatch` next to the
              # hatchfile; the literal `:` in the filename is fine
              # on Linux. Run with the cache env var so transitive
              # deps resolve from prior iterations.
              try:
                  subprocess.run(
                      [HATCH_BIN, "build", dir_],
                      check=True,
                      env={**os.environ, "HATCH_CACHE_DIR": CACHE_DIR},
                  )
              except subprocess.CalledProcessError as e:
                  print(f"::error::hatch build failed for {name}: {e}")
                  sys.exit(1)

              if not os.path.isfile(out_path):
                  print(f"::error::expected {out_path} after `hatch build`")
                  sys.exit(1)

              cache_name = f"{flat}-{version}.hatch"
              shutil.copy(out_path, os.path.join(CACHE_DIR, cache_name))
              print(f"cached {name}@{version} → {cache_name}")

              # Mirror under every pinned version a sibling asks
              # for, so version-pinned lookups land on the same
              # bytes. Skip the current version (already written).
              for pinned in required_versions.get(name, set()):
                  if pinned == version:
                      continue
                  alias = f"{flat}-{pinned}.hatch"
                  shutil.copy(out_path, os.path.join(CACHE_DIR, alias))
                  print(f"  ↳ aliased to {alias} (consumer pin)")
          PY

      - name: Run every package's spec
        shell: bash
        env:
          # Spec runs are fully offline. Signal to any package
          # that keys off the flag — today @hatch:http uses
          # HATCH_OFFLINE to skip network tests. Keeps CI
          # deterministic and free of external dependencies.
          HATCH_OFFLINE: "1"
          # Resolve runtime [dependencies] from the workspace
          # cache populated by the pre-build step above. With
          # HATCH_OFFLINE set, version pins must be cache-resident
          # or the resolver aborts before the spec ever runs.
          HATCH_CACHE_DIR: ${{ github.workspace }}/.hatch-cache
          # Packages whose specs need real hardware (audio device,
          # GPU context, window server) and therefore can't run
          # on a vanilla GitHub runner. The build-plugins step
          # still compiles them; the spec run skips them with a
          # warning. Move a package out of this list once its
          # spec is hardware-free OR the runner can be configured
          # to provide a stub (e.g. `pulseaudio --start
          # --exit-idle-time=-1` for audio).
          HATCH_CI_SKIP: "hatch-audio hatch-gpu hatch-window"
        run: |
          set -u
          wlift="$PWD/bin/wlift"
          mode="${{ matrix.mode }}"
          total=0
          passed=0
          skipped=0
          skipped_pkgs=()
          failed_pkgs=()

          for dir in packages/*/; do
            pkg=$(basename "$dir")
            hf="$dir/hatchfile"
            [ -f "$hf" ] || continue
            # `ls` exits 2 when the glob has no matches — under
            # `set -eu -o pipefail` that propagates through the
            # `$(...)` assignment and kills the loop before the
            # `-n "$spec"` guard fires. `|| true` keeps the empty-
            # match case quiet so the guard can do its job.
            spec=$(ls "$dir"*.spec.wren 2>/dev/null | head -1 || true)
            [ -n "$spec" ] || continue

            # Hardware-bound packages — see `HATCH_CI_SKIP` env
            # comment above. Whitespace-separated list match.
            if [[ " $HATCH_CI_SKIP " == *" $pkg "* ]]; then
              echo "::warning title=$pkg::skipped (hardware-bound; HATCH_CI_SKIP)"
              skipped=$((skipped + 1))
              skipped_pkgs+=("$pkg (hardware-bound)")
              continue
            fi

            # Skip plugin-backed packages whose dylibs haven't
            # made it into `libs/`. The build-wlift job is supposed
            # to drop a fresh `lib<crate>.so` here, but if that
            # step missed (e.g. the workspace's plugin set drifted
            # from the catalog's [plugin_source].crate names) we
            # warn and keep going rather than fail the spec for
            # what amounts to a CI plumbing issue. The check looks
            # for a real `.so` — `.gitignore` alone (the only thing
            # tracked in `libs/`) used to make `ls -A` non-empty
            # and trip the package as "ready" when nothing was.
            if grep -q '^\[plugin_source\]' "$hf"; then
              # `libs/` may be flat (local-dev `cargo build` drop) or
              # nested under `<os>-<arch>/` (CI staging matches the
              # hatchfile's per-triple `[native_libs]` mapping). Both
              # layouts are valid; detect either with `find -name`.
              if ! find "$dir"libs -maxdepth 2 -name '*.so' -print -quit 2>/dev/null | grep -q .; then
                echo "::warning title=$pkg::skipped (plugin-backed, no .so staged)"
                skipped=$((skipped + 1))
                skipped_pkgs+=("$pkg (plugin-backed, no .so staged)")
                continue
              fi
            fi

            total=$((total + 1))
            echo "::group::$pkg ($mode)"

            specname=$(basename "$spec")
            # Run from within the package dir so relative imports
            # (`import "./foo"`) resolve.
            pushd "$dir" >/dev/null
            if output=$("$wlift" --mode "$mode" "$specname" 2>&1); then
              if echo "$output" | grep -q "^ok:"; then
                echo "$output" | grep "^ok:"
                passed=$((passed + 1))
              else
                echo "::error title=$pkg ($mode)::no 'ok:' summary line"
                echo "$output" | tail -30
                failed_pkgs+=("$pkg")
              fi
            else
              rc=$?
              echo "::error title=$pkg ($mode)::wlift exited with $rc"
              echo "$output" | tail -30
              failed_pkgs+=("$pkg")
            fi
            popd >/dev/null
            echo "::endgroup::"
          done

          echo ""
          echo "========================================"
          echo " $mode: $passed / $total ran ($skipped skipped)"
          echo "========================================"
          if [ "$skipped" -gt 0 ]; then
            echo ""
            echo "Skipped packages:"
            for p in "${skipped_pkgs[@]}"; do echo "  - $p"; done
          fi
          if [ "${#failed_pkgs[@]}" -gt 0 ]; then
            echo ""
            echo "Failing packages:"
            for p in "${failed_pkgs[@]}"; do echo "  - $p"; done
            exit 1
          fi

  # ---------------------------------------------------------------
  # Parse-check the MANIFEST / catalog index so a malformed entry
  # fails CI before someone tries to publish from it.
  # ---------------------------------------------------------------
  catalog-lint:
    name: Catalog lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check every hatchfile parses as TOML
        shell: bash
        run: |
          set -e
          fail=0
          for hf in packages/*/hatchfile; do
            if ! python3 -c "import tomllib, sys; tomllib.load(open('$hf', 'rb'))" 2>/dev/null; then
              echo "::error file=$hf::invalid TOML"
              fail=1
            fi
          done
          if [ -f index.toml ]; then
            if ! python3 -c "import tomllib; tomllib.load(open('index.toml', 'rb'))"; then
              echo "::error file=index.toml::invalid TOML"
              fail=1
            fi
          fi
          [ "$fail" = "0" ]

      - name: Every package has a spec
        shell: bash
        run: |
          set -e
          fail=0
          for dir in packages/*/; do
            [ -f "$dir/hatchfile" ] || continue
            if ! ls "$dir"*.spec.wren >/dev/null 2>&1; then
              echo "::warning title=$(basename $dir)::no *.spec.wren found"
            fi
          done
