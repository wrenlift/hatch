name: Sync catalog to index.toml

# Mirrors the Supabase-backed `packages` catalog into a plain TOML
# file checked into this repo. Consumers who want a git-native view
# of the ecosystem (or a backup if the hosted service ever goes
# away) get it here, automatically refreshed.
#
# The catalog's anon key is public by design — Supabase gates every
# request through row-level security. Reads of the `packages` table
# are intentionally world-readable, so hard-coding the key in a
# scheduled workflow is fine.

on:
  schedule:
    # Every 6 hours at :00. Catalog updates land within that window;
    # `hatch publish` already commits immediately, so this is purely
    # for the offline / transparency mirror.
    - cron: '0 */6 * * *'
  # Manual trigger for maintainers who want to force a refresh.
  workflow_dispatch:

permissions:
  # `contents: write` lets the action push the sync branch.
  # `pull-requests: write` lets it open / update the PR.
  # Direct-pushing to `main` is blocked by the repo's "changes must
  # land via PR" rule, so we route through a PR instead. The action
  # no-ops when `index.toml` is unchanged (no empty PRs).
  contents: write
  pull-requests: write

concurrency:
  # Overlapping runs would fight each other on the PR branch.
  group: sync-index
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch catalog from Supabase
        env:
          SUPABASE_URL: https://bncbgsfttafynyalrrbb.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_uTNCHuGnN5mzsWbuJI8CQg_0qFEBQRz
        run: |
          set -euo pipefail
          curl -sSL --fail \
            -H "apikey: $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/packages?select=*" \
            > /tmp/packages.json
          # Sanity: must be a JSON array. Empty `[]` is valid and
          # produces an index.toml with no package tables.
          python -c "import json,sys; d=json.load(open('/tmp/packages.json')); assert isinstance(d,list), 'not a list'"

      - name: Generate index.toml
        run: python .github/scripts/gen-index.py < /tmp/packages.json > index.toml

      - name: Open / update sync PR
        uses: peter-evans/create-pull-request@v7
        with:
          # Stable branch name — successive runs update this same
          # branch in place rather than accumulating a fresh one
          # every 6 hours. If the branch is merged, the next run
          # recreates it from main.
          branch: bot/sync-index
          # Keep the bot's commits associated with a clearly-named
          # identity in `git log`.
          commit-message: "chore: sync index.toml from catalog"
          author: "hatch-bot <hatch-bot@users.noreply.github.com>"
          committer: "hatch-bot <hatch-bot@users.noreply.github.com>"
          title: "chore: sync index.toml from catalog"
          body: |
            Auto-generated by `.github/workflows/sync-index.yml`.

            Mirrors the Supabase-backed `packages` table into
            `index.toml`. Opening as a PR rather than pushing to
            `main` because the branch protection rule requires
            changes to land via review.

            Merge to publish; the workflow will keep this PR in sync
            with the catalog until it's merged.
          labels: |
            automation
            catalog-sync
          delete-branch: true
          # Scope the diff so stray changes never sneak in through
          # the bot PR — if anything outside `index.toml` is dirty,
          # the action will error rather than committing it.
          add-paths: |
            index.toml
