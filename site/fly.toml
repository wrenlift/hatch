# Fly.io config for hatch.wrenlift.com.
#
# Deploy via:
#
#   fly deploy --remote-only --config site/fly.toml -a hatch-wrenlift
#
# CNAME setup (one-time, manual at the wrenlift apex DNS):
#
#   hatch.wrenlift.com  CNAME  hatch-wrenlift.fly.dev
#   fly certs add hatch.wrenlift.com -a hatch-wrenlift

app = "hatch-wrenlift"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep the machine running while we shake out the first deploy.
  # Once startup is reliably sub-second we can flip back to
  # `auto_stop_machines = "stop"` + `min_machines_running = 0`
  # to spin down on idle.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  # 1gb minimum: the wlift runtime allocates ~512mb upfront for
  # the JIT code arena, plus the in-memory SQLite catalog +
  # template registry caches + per-request fiber stacks. A 512mb
  # VM leaves ~480mb after kernel/init, which fails the upfront
  # alloc immediately ("memory allocation of 536870912 bytes
  # failed" + SIGABRT → Fly restart-loop).
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
