# Fly.io config for hatch.wrenlift.com.
#
# Deploy via:
#
#   fly deploy --remote-only --config site/fly.toml -a hatch-wrenlift
#
# CNAME setup (one-time, manual at the wrenlift apex DNS):
#
#   hatch.wrenlift.com  CNAME  hatch-wrenlift.fly.dev
#   fly certs add hatch.wrenlift.com -a hatch-wrenlift

app = "hatch-wrenlift"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  # Override the GC's default 512mb nursery arena down to 64mb —
  # the v0.1.0 wlift binary running here was built before the
  # smaller default landed on main, and a webapp's actual working
  # set is ~165mb (locally measured). Drop this env once the next
  # tagged release ships with the lower default baked in.
  WLIFT_GC_NURSERY_MB = "64"
  # Keep `@hatch:template`'s render-time hot path in the BC
  # interpreter. The tiered JIT intermittently mis-compiles one
  # of these methods and the route handler returns an Object
  # instance instead of the rendered String — `Response.coerce`
  # then falls back to `.toString` and the page body becomes the
  # literal text "instance of Object" (~1-in-15 navigations
  # observed). Skipping JIT for the substrings below matches
  # `walk_`, `walkAll`, `evalExpr_`, `stringify_`, etc. and the
  # handful of helpers they call. Drop the env once the
  # mis-compile is root-caused — the existing `template.wren`
  # comment about `skipWs_` mis-compiling is the smoke trail.
  WLIFT_SKIP_JIT = "walk_,walkAll,evalExpr_,evalPath_,stringify_,htmlEscape_,applyFilter_,truthy_,cmp_"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep the machine running while we shake out the first deploy.
  # Once startup is reliably sub-second we can flip back to
  # `auto_stop_machines = "stop"` + `min_machines_running = 0`
  # to spin down on idle.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  # 512mb. wlift's resident set is ~145mb at idle, but Fly's VMs
  # eat ~80mb for kernel + init, leaving 256mb with no headroom
  # for the spike when a request streams a large asset (the 320kb
  # mascot PNG was enough to OOM-kill at 256mb). 512mb leaves
  # ~285mb of working budget on top of the steady state, which
  # is comfortable.
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
