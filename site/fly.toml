# Fly.io config for hatch.wrenlift.com.
#
# Deploy via:
#
#   fly deploy --remote-only --config site/fly.toml -a hatch-wrenlift
#
# CNAME setup (one-time, manual at the wrenlift apex DNS):
#
#   hatch.wrenlift.com  CNAME  hatch-wrenlift.fly.dev
#   fly certs add hatch.wrenlift.com -a hatch-wrenlift

app = "hatch-wrenlift"
# `primary_region` is the default landing zone for newly-spawned
# machines (e.g. `fly machine run`). Fly's anycast routing picks
# the closest healthy machine on a per-request basis regardless,
# so this just controls where `fly deploy` puts a fresh machine
# if you haven't pinned one explicitly. Owner is BST-based and
# the bulk of expected traffic is UK / US East, so LHR is the
# better default than IAD. The cross-region replica machine
# (IAD) is created via `fly m clone --region iad <lhr-id>`
# rather than `fly.toml`, since `[[vm]]` blocks don't take a
# region directive — region placement is per-machine in Fly's
# v2 model.
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  # Override the GC's default 512mb nursery arena down to 64mb —
  # the v0.1.0 wlift binary running here was built before the
  # smaller default landed on main, and a webapp's actual working
  # set is ~165mb (locally measured). Drop this env once the next
  # tagged release ships with the lower default baked in.
  WLIFT_GC_NURSERY_MB = "64"
  # Cap glibc malloc's per-thread arenas. Default
  # `MALLOC_ARENA_MAX` is 8 × ncpus on Linux; each arena can
  # commit up to ~128mb of vmem under fragmentation. wlift has
  # ≥ 2 long-lived threads (main + JIT compile broker), so we
  # observed Linux x86_64 hitting 399mb anon-rss and OOM-killing
  # at the 512mb Fly limit, while local Apple Silicon plateaued
  # at 176mb on the same workload (darwin's libmalloc doesn't
  # use this multi-arena model). Pinning to 2 keeps a small
  # amount of contention-mitigation while bounding worst-case
  # to ~256mb instead of letting it climb open-ended.
  MALLOC_ARENA_MAX = "2"
  # Keep `@hatch:template`'s parser hot path in the BC interpreter.
  # Same JIT mis-compile family as `skipWs_` (documented in
  # template.wren:217-221) producing corrupt token types —
  # observed under load as `Error: unexpected stray directive:
  # cls.slug`, which is the parser correctly bailing because the
  # lexer fed it a `{% cls.slug %}` statement-style token where
  # the source actually had `{{ cls.slug }}` interpolation.
  # Auto-deopt (v0.1.10) only fires on `Object does not
  # implement` dispatch failures; a `Fiber.abort` for corrupt
  # tokens doesn't trip that path, so we ban the suspect
  # functions explicitly until the underlying codegen bug is
  # root-caused. Substring match against `mir.name`; covers
  # Lex_ + Parse_ + ExprParse_ methods involved in tokenisation
  # + statement bookkeeping.
  # @hatch:json's parser family is added alongside the
  # @hatch:template family below — same JIT mis-compile shape
  # surfaces as `JSON: trailing data at offset N` (parser
  # correctly bailing because `skipWs_` / `atEnd_` was
  # mis-compiled and didn't actually advance / didn't see
  # end-of-input). Substring match against `mir.name` so
  # `parseValue_` covers @hatch:json AND any other
  # `*parseValue_` method the same way.
  WLIFT_SKIP_JIT = "parseBody_,parseStmt_,parsePrimary_,parseFilter_,parsePath_,parseString_,parseNumber_,parseIdent_,parseExtends_,parseBlock_,parseIf_,parseFor_,parseSlot_,parseEmbed_,parseCall_,parseSet_,parseInclude_,parseFragment_,parseFillBody_,parseValue_,parseObject_,parseArray_,parseTrue_,parseFalse_,parseNull_,parseLiteral_,atEnd_,offset_,skipWs_,peek_,eat_,peekWord_,eatWord_,firstWord_,rest_,flushText_,interp_,stmt_,comment_,skipLeadingWs_,rtrim_,peekStmt_,findInKeyword_"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep the machine running while we shake out the first deploy.
  # Once startup is reliably sub-second we can flip back to
  # `auto_stop_machines = "stop"` + `min_machines_running = 0`
  # to spin down on idle.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  # 768mb. The deploy-site GitHub workflow reads this value on
  # every push to `site/**`, so a UI-side scale upgrade gets
  # silently reverted on the next auto-deploy if `fly.toml`
  # disagrees. We're at 768mb because Linux x86_64 wlift hits
  # ~399mb anon-rss under JIT load — `MALLOC_ARENA_MAX=2`
  # (above) caps glibc's per-thread arenas to keep that bounded,
  # but the headroom above the working set is still tight on
  # 512mb (kernel + init eat ~80mb). 768mb leaves a comfortable
  # buffer for the JIT-compile spikes that happen during the
  # first burst of traffic after a deploy.
  memory = "768mb"
  cpu_kind = "shared"
  cpus = 1
